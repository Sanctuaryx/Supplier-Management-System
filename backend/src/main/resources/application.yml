spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/supplierdb}
    username: ${DB_USER:supplier}
    password: ${DB_PASS:supplier}
    hikari:
      maximum-pool-size: 10
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
country-service:
  base-url: ${COUNTRY_SERVICE_URL:http://localhost:8088}

server:
  port: 8080
